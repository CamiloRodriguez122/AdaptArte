<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdaptArte | Personaliza tu mueble</title>
  <link rel="stylesheet" href="style_buy.css">
</head>
<body>

  <header class="navbar">
    <div class="logo">ADAPTARTE</div>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="buy.html" class="active">Buy</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="closing.html">Closing</a></li>
      </ul>
    </nav>
  </header>

  <div class="content-box">
    <div class="container">
      <div class="image-section">
        <img id="product-image" alt="">
        <video id="product-video" autoplay loop muted style="display:none; border-radius:20px; max-width:100%;"></video>
      </div>

      <div class="config-section">
        <h2 id="product-name"></h2>
        <p>Personaliza tu mueble</p>

        <div class="input-group">
          <label for="height">Altura (cm)</label>
          <input type="number" id="height" min="30" max="200" value="85">
        </div>

        <div class="input-group">
          <label for="width">Ancho (cm)</label>
          <input type="number" id="width" min="30" max="200" value="45">
        </div>

        <div class="input-group">
          <label for="quantity">Cantidad</label>
          <input type="number" id="quantity" min="1" value="1">
        </div>

        <div class="input-group" id="colorGroup">
          <label>Color</label>
          <div class="color-options">
            <div class="color green" data-color="verde"></div>
            <div class="color brown" data-color="cafe"></div>
            <div class="color beige" data-color="beige"></div>
          </div>
        </div>

        <button class="btn add" id="addToCartBtn">Agregar al carrito</button>
      </div>
    </div>
  </div>

  <script src="buy.js"></script>
  <script src="script.js"></script>
</body>
</html>
