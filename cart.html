<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdaptArte | Carrito</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ---- CART PAGE ESPECÍFICO ---- */
    .cart-page {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 140px 20px 100px;
    }

    .cart-wrapper {
      display: flex;
      align-items: center;
      gap: 60px;
      width: 90%;
      max-width: 1050px;
      flex-wrap: wrap;
    }

    /* Caja decorativa izquierda */
    .cart-box-img {
      flex: 0 0 260px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .cart-box-img .box-emoji {
      font-size: 10rem;
      filter: drop-shadow(0 8px 20px rgba(80,45,15,0.3));
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }

    /* Panel del carrito */
    .cart-panel {
      flex: 1;
      min-width: 320px;
      background: rgba(195, 155, 110, 0.42);
      backdrop-filter: blur(12px);
      border-radius: 25px;
      border: 1px solid rgba(139, 90, 43, 0.28);
      box-shadow: 0 4px 25px rgba(80,45,15,0.15);
      padding: 30px 35px;
    }

    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(139,90,43,0.25);
      padding-bottom: 12px;
      margin-bottom: 20px;
    }

    .cart-header h2 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #ffffff;
    }

    .cart-close {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.75);
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
    }

    /* Fila del producto */
    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .cart-item-name {
      font-size: 0.9rem;
      font-weight: 700;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      flex: 1;
    }

    .cart-item-pricing {
      text-align: right;
    }

    .price-original {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.6);
      text-decoration: line-through;
      margin-right: 6px;
    }

    .price-current {
      font-size: 0.95rem;
      font-weight: 700;
      color: #ffffff;
    }

    /* Selector de cantidad */
    .qty-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .qty-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.22);
      color: #ffffff;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
    }

    .qty-btn:hover { background: rgba(255,255,255,0.4); }

    #qty-display {
      font-size: 1rem;
      font-weight: 600;
      color: #ffffff;
      min-width: 20px;
      text-align: center;
    }

    /* Subtotal por ítem (alineado derecha) */
    .item-subtotal {
      margin-left: auto;
      font-weight: 600;
      color: #ffffff;
      font-size: 0.95rem;
    }

    /* Separador */
    .cart-divider {
      border: none;
      border-top: 1px solid rgba(139,90,43,0.2);
      margin: 15px 0;
    }

    /* Código promo */
    .promo-label {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.85);
      margin-bottom: 6px;
      display: block;
      font-style: italic;
    }

    .promo-row {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
    }

    .promo-input {
      flex: 1;
      padding: 8px 12px;
      border-radius: 12px;
      border: 1px solid rgba(139,90,43,0.3);
      background: rgba(230,200,165,0.5);
      color: #3d2b1f;
      font-size: 0.9rem;
      font-family: 'Poppins', sans-serif;
    }

    .promo-btn {
      padding: 8px 16px;
      border-radius: 12px;
      border: 1px solid rgba(139,90,43,0.45);
      background: rgba(180,135,85,0.5);
      color: #3d2b1f;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      transition: 0.2s;
    }

    .promo-btn:hover { background: rgba(255,255,255,0.45); }
    .promo-msg { font-size: 0.78rem; color: rgba(255,255,255,0.8); margin-bottom: 10px; min-height: 16px; }

    /* Total */
    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }

    .total-label { font-weight: 700; font-size: 1rem; color: #ffffff; }
    .total-amount { font-weight: 700; font-size: 1.1rem; color: #ffffff; }

    .tax-note { font-size: 0.75rem; color: rgba(255,255,255,0.7); margin-bottom: 20px; }

    /* Botones de acción */
    .cart-actions { display: flex; flex-direction: column; gap: 10px; }

    .btn-payment {
      display: block;
      text-align: center;
      padding: 12px;
      border-radius: 25px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      transition: 0.3s;
      text-decoration: none;
      background: rgba(180,135,85,0.55);
      color: #3d2b1f;
      border: 1px solid rgba(139,90,43,0.5);
    }

    .btn-payment:hover { background: rgba(160,120,80,0.75); }

    .btn-view-cart {
      display: block;
      text-align: center;
      padding: 12px;
      border-radius: 25px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      transition: 0.3s;
      text-decoration: none;
      background: rgba(100,65,30,0.7);
      color: #f5e6d0;
      border: 1px solid rgba(80,45,10,0.6);
    }

    .btn-view-cart:hover { background: rgba(80,45,10,0.9); }

    .cart-breadcrumb {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.7);
      margin-bottom: 25px;
    }
    .cart-breadcrumb a { color: rgba(255,255,255,0.85); text-decoration: none; }
    .cart-breadcrumb a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="logo">ADAPTARTE</div>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="buy.html" class="active">buy</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="closing.html">Closing</a></li>
      </ul>
    </nav>
  </header>

  <!-- CART CONTENT -->
  <main class="cart-page">
    <div class="cart-wrapper">

      <!-- Imagen decorativa: caja -->
      <div class="cart-box-img">
        <span class="box-emoji">📦</span>
      </div>

      <!-- Panel del carrito -->
      <div class="cart-panel">

        <div class="cart-breadcrumb"><a href="index.html">Home</a></div>

        <div class="cart-header">
          <h2>Carrito</h2>
          <a class="cart-close" href="products.html" title="Seguir comprando">✕</a>
        </div>

        <!-- Producto -->
        <div class="cart-item">
          <span class="cart-item-name" id="cartProductName">SILLA PLEGABLE</span>
          <div class="cart-item-pricing">
            <span class="price-original" id="cartOriginalPrice">$100,00</span>
            <span class="price-current" id="cartCurrentPrice">$100,00</span>
          </div>
        </div>

        <!-- Cantidad -->
        <div class="qty-row">
          <button class="qty-btn" id="qtyMinus">−</button>
          <span id="qty-display">1</span>
          <button class="qty-btn" id="qtyPlus">+</button>
          <span class="item-subtotal" id="itemSubtotal">$100,00</span>
        </div>

        <hr class="cart-divider">

        <!-- Código de promoción -->
        <span class="promo-label">Ingresar Código de Promocion</span>
        <div class="promo-row">
          <input type="text" class="promo-input" id="promoCode" placeholder="Ej: ADAPTARTE10">
          <button class="promo-btn" id="applyPromo">Aplicar</button>
        </div>
        <div class="promo-msg" id="promoMsg"></div>

        <hr class="cart-divider">

        <!-- Total -->
        <div class="total-row">
          <span class="total-label">Total estimado</span>
          <span class="total-amount" id="cartTotal">$100,00</span>
        </div>
        <p class="tax-note">Los impuestos y costos de envio se calculan en la pagina de pago.</p>

        <!-- Botones -->
        <div class="cart-actions">
          <a class="btn-payment" id="goToPayment" href="checkout.html">Pagina de pago</a>
        </div>

      </div>
    </div>
  </main>

  <script src="cart.js"></script>
</body>
</html>
